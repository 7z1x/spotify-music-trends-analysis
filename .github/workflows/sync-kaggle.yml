name: Sync Kaggle Notebook

on:
  schedule:
    - cron: '0 */6 * * *'  # Otomatis jalan setiap 6 jam
  workflow_dispatch:         # Bisa di-trigger manual dari GitHub

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle API
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Pull Notebook from Kaggle
        run: |
          kaggle kernels pull zx1700/da02-spotify -p ./temp/
          # Rename ke nama file yang ada di repo
          mv ./temp/da02-spotify.ipynb ./da02-spotify-music-trends.ipynb
          rm -rf ./temp/

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "🔄 Auto-sync notebook from Kaggle $(date +'%Y-%m-%d %H:%M UTC')"
          git push
